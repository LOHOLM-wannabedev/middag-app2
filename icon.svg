<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Bakgrunn -->
  <rect width="512" height="512" rx="100" fill="#0f0f1a"/>
  
  <!-- Gyllen glød bak kjøttet -->
  <ellipse cx="256" cy="280" rx="160" ry="100" fill="#e8c547" opacity="0.08"/>

  <!-- Kjøttstykke (biff/steak form) -->
  <path d="
    M 140 200
    C 130 170, 160 140, 200 150
    C 220 130, 260 125, 290 140
    C 320 125, 370 135, 380 165
    C 410 175, 400 220, 385 240
    C 400 265, 390 310, 360 320
    C 340 350, 290 355, 260 345
    C 230 360, 175 350, 155 325
    C 125 310, 120 265, 140 240
    C 125 225, 128 210, 140 200
    Z"
    fill="#1a1a2e"
    stroke="#e8c547"
    stroke-width="6"
  />

  <!-- Indre kjøttfarge -->
  <path d="
    M 165 210
    C 158 188, 182 165, 210 172
    C 228 155, 262 150, 288 163
    C 314 150, 354 160, 362 184
    C 384 193, 376 228, 363 244
    C 376 265, 367 302, 342 310
    C 324 335, 282 339, 256 330
    C 230 343, 183 334, 165 312
    C 140 300, 138 262, 155 244
    C 142 231, 144 218, 165 210
    Z"
    fill="#2a1a0e"
  />

  <!-- Rødt kjøtt i midten -->
  <path d="
    M 190 215
    C 185 200, 200 185, 220 190
    C 235 178, 265 175, 285 188
    C 305 176, 335 184, 340 202
    C 358 210, 352 238, 340 250
    C 350 268, 343 295, 322 302
    C 308 322, 276 325, 256 317
    C 236 328, 198 320, 184 302
    C 164 292, 163 263, 176 250
    C 165 238, 166 225, 190 215
    Z"
    fill="#3d1a0a"
  />

  <!-- Marmorering / fett-striper -->
  <path d="M 210 200 Q 240 210 260 200 Q 275 215 295 205" stroke="#e8c547" stroke-width="2.5" fill="none" opacity="0.4"/>
  <path d="M 195 240 Q 225 248 250 238 Q 270 252 300 242" stroke="#e8c547" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M 205 270 Q 235 278 265 268" stroke="#e8c547" stroke-width="1.5" fill="none" opacity="0.25"/>

  <!-- Bein -->
  <rect x="290" y="290" width="28" height="80" rx="14" fill="#1a1a2e" stroke="#e8c547" stroke-width="4"/>
  <ellipse cx="304" cy="370" rx="22" ry="14" fill="#1a1a2e" stroke="#e8c547" stroke-width="4"/>

  <!-- Glans/highlight på kjøttet -->
  <ellipse cx="230" cy="205" rx="30" ry="12" fill="white" opacity="0.04" transform="rotate(-20, 230, 205)"/>

  <!-- Gyllen ring rundt -->
  <rect width="512" height="512" rx="100" fill="none" stroke="#e8c547" stroke-width="12" opacity="0.15"/>
</svg>
